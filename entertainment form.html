<!DOCTYPE html>
<html>
<head>
    <title>Entertainment Form</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f0f0f0;
        }

        .container{
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 40px;
            border-radius: 10px;
        }

        h2{
            text-align: center;
            color: blue;
        }

        label{
            font-weight: bold;
        }

        input, select, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            font-size: 16px;
        }

        button:hover{
            background: darkblue;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Entertainment Form</h2>

    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Favorite Entertainment</label>
        <select>
            <option>Music</option>
            <option>Movies</option>
            <option>Football</option>
            <option>Games</option>
            <option>Dancing</option>
        </select>

        <label>Gender</label><br>

        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

        <br><br>

        <label>Hobbies</label><br>

        <input type="checkbox"> Singing
        <input type="checkbox"> Watching Movies
        <input type="checkbox"> Playing Games

        <br><br>

        <label>Comment</label>
        <textarea rows="4"></textarea>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
