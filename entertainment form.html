<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entertainment Form</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --ink:#0f1117;
    --cream:#f5f0e8;
    --gold:#c8973a;
    --rust:#b84c2e;
    --mist:#dcd6cb;
    --white:#ffffff;
}

body{
    font-family:'DM Sans', sans-serif;
    background:var(--cream);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* FORM CARD */

.container{
    width:100%;
    max-width:650px;
    background:var(--white);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.1);
}

/* TOP HEADER */

.form-header{
    background:var(--ink);
    color:var(--cream);
    padding:40px;
    position:relative;
}

.form-header::before{
    content:'';
    position:absolute;
    inset:0;

    background:repeating-linear-gradient(
        135deg,
        transparent,
        transparent 28px,
        rgba(200,151,58,.06) 28px,
        rgba(200,151,58,.06) 29px
    );
}

.form-header h2{
    position:relative;
    font-family:'Playfair Display', serif;
    font-size:2rem;
    margin-bottom:10px;
}

.form-header p{
    position:relative;
    opacity:.75;
    line-height:1.7;
}

/* FORM */

form{
    padding:40px;
}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:var(--ink);
}

/* INPUTS */

input[type="text"],
input[type="email"],
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid var(--mist);
    border-radius:6px;
    background:#faf7f2;
    font-size:.95rem;
    outline:none;
    transition:.2s;
}

input[type="text"]:focus,
input[type="email"]:focus,
select:focus,
textarea:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(200,151,58,.15);
}

/* RADIO & CHECKBOX */

.options{
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    margin-top:10px;
}

.options label{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:500;
    color:#555;
}

/* BUTTON */

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:6px;
    background:var(--ink);
    color:var(--cream);
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:var(--gold);
    color:var(--ink);
}

/* RESPONSIVE */

@media(max-width:600px){

    .form-header{
        padding:30px 25px;
    }

    form{
        padding:30px 25px;
    }

    .form-header h2{
        font-size:1.7rem;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="form-header">
        <h2>Entertainment Form</h2>

        <p>
            Join our entertainment community and share your
            favorite activities, hobbies, and interests.
        </p>
    </div>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label>Favorite Entertainment</label>

            <select>
                <option>Music</option>
                <option>Movies</option>
                <option>Football</option>
                <option>Games</option>
                <option>Dancing</option>
            </select>
        </div>

        <div class="form-group">

            <label>Gender</label>

            <div class="options">
                <label>
                    <input type="radio" name="gender">
                    Male
                </label>

                <label>
                    <input type="radio" name="gender">
                    Female
                </label>
            </div>

        </div>

        <div class="form-group">

            <label>Hobbies</label>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Singing
                </label>

                <label>
                    <input type="checkbox">
                    Watching Movies
                </label>

                <label>
                    <input type="checkbox">
                    Playing Games
                </label>

            </div>

        </div>

        <div class="form-group">
            <label>Comment</label>
            <textarea rows="5" placeholder="Write your comment..."></textarea>
        </div>

        <button type="submit">
            Submit Form →
        </button>

    </form>

</div>

</body>
</html>
